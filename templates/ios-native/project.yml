# XcodeGen config for {{APP_NAME}} — generated by bare-kit-pear init.
#
# Source of truth — the .xcodeproj is a derived artifact (gitignored).
# Regenerate with:   cd ios-native && xcodegen generate
#
# See ../BUILD.md (root) for the full recipe and
# ./BUILD.md for project-specific notes.

name: {{APP_NAME}}
options:
  bundleIdPrefix: com.{{APP_NAME}}
  deploymentTarget:
    iOS: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # fill in for device signing
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  BareKit:
    url: https://github.com/holepunchto/bare-kit-swift
    branch: main
  BarePear:
    # Resolved from node_modules/bare-kit-pear — requires `npm install`
    # to have placed the package there. For production, switch to a
    # GitHub URL once you've published a fork/release.
    path: ../node_modules/bare-kit-pear

targets:
  {{APP_NAME}}:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: {{APP_NAME}}/Sources
      - path: {{APP_NAME}}/Info.plist
        buildPhase: none
      - path: {{APP_NAME}}/{{APP_NAME}}.entitlements
        buildPhase: none
      - path: {{APP_NAME}}/Assets.xcassets
      - path: {{APP_NAME}}/LaunchScreen.storyboard
      # Bare-packed worklet bundle. Produce with: npm run barekit:bundle
      # Output path matches src/commands/bundle.js defaults; xcodegen picks
      # it up here and copies it into the .app's resource folder.
      - path: ../backend/dist/backend.ios.bundle
        type: file
        optional: true
    resources:
      - path: {{APP_NAME}}/Assets.xcassets
      - path: {{APP_NAME}}/LaunchScreen.storyboard
      - path: ../backend/dist/backend.ios.bundle
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.{{APP_NAME}}
        INFOPLIST_FILE: {{APP_NAME}}/Info.plist
        CODE_SIGN_ENTITLEMENTS: {{APP_NAME}}/{{APP_NAME}}.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        OTHER_LDFLAGS: "-ObjC"
    # ----------------------------------------------------------------
    # DEPENDENCIES
    #
    # DO NOT HAND-EDIT the addon list below — regenerate via:
    #
    #     bare-kit-pear doctor --fix
    #
    # The canonical source of truth for the addon set + version suffixes
    # is `src/manifests/rnbk-known-good.json` in the `bare-kit-pear`
    # package (the rnbk-known-good manifest). `addons` mirrors the
    # corresponding xcframeworks out of
    # `node_modules/react-native-bare-kit/ios/addons/`; `doctor` warns
    # if what's on disk drifts from what's declared here.
    #
    # If you bump `react-native-bare-kit` and the manifest doesn't yet
    # cover the new version, follow `src/manifests/README.md` to add it.
    # ----------------------------------------------------------------
    dependencies:
      - framework: {{APP_NAME}}/Frameworks/BareKit.xcframework
        embed: true
      - package: BareKit
        product: BareKit
      - package: BarePear
        product: BarePear
      # Native addons (17). Mirrored by `npx bare-kit-pear addons` from
      # node_modules/react-native-bare-kit/ios/addons/. Version suffixes
      # follow the rnbk release at time of generation — run
      # `npx bare-kit-pear doctor` to check for drift.
      - framework: {{APP_NAME}}/Frameworks/addons/bare-crypto.1.13.4.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-dns.2.1.4.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-fs.4.6.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-inspect.3.1.4.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-os.3.8.7.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-pipe.4.1.5.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-subprocess.5.2.3.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-tcp.2.2.7.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-type.1.1.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/bare-url.2.4.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/fs-native-extensions.1.4.5.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/quickbit-native.2.4.8.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/rabin-native.2.0.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/rocksdb-native.3.15.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/simdle-native.1.3.9.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/sodium-native.5.1.0.xcframework
        embed: true
      - framework: {{APP_NAME}}/Frameworks/addons/udx-native.1.19.2.xcframework
        embed: true

schemes:
  {{APP_NAME}}:
    build:
      targets:
        {{APP_NAME}}: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

configs:
  Debug: debug
  Release: release
